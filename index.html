<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simplicio E. Abet — Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F6F3;
    --ink: #111110;
    --mid: #8A8A85;
    --accent: #C8B89A;
    --rule: #DDDBD6;
  }

  html { font-size: 16px; scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── NAV ── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 2rem 3.5rem;
    z-index: 10;
    background: var(--bg);
  }

  .nav-logo {
    font-family: 'DM Serif Display', serif;
    font-size: 1rem;
    letter-spacing: 0.02em;
    color: var(--ink);
    text-decoration: none;
  }

  .nav-links {
    display: flex;
    gap: 2.5rem;
    list-style: none;
  }

  .nav-links a {
    font-size: 0.75rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--mid);
    text-decoration: none;
    transition: color 0.2s;
  }

  .nav-links a:hover { color: var(--ink); }

  /* ── HERO ── */
  .hero {
    padding: 14rem 3.5rem 6rem;
    max-width: 900px;
  }

  .hero-eyebrow {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--mid);
    margin-bottom: 2rem;
  }

  .hero-name {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(3.5rem, 8vw, 6.5rem);
    line-height: 1.0;
    letter-spacing: -0.02em;
    color: var(--ink);
    margin-bottom: 2.5rem;
  }

  .hero-name em {
    font-style: italic;
    color: var(--mid);
  }

  .hero-desc {
    font-size: 1rem;
    color: var(--mid);
    max-width: 38ch;
    line-height: 1.8;
  }

  /* ── SIGNATURE RULE ── */
  .rule-wrap {
    padding: 0 3.5rem;
    margin-bottom: 5rem;
  }

  .rule {
    height: 1px;
    background: var(--rule);
    position: relative;
    overflow: hidden;
  }

  .rule::after {
    content: '';
    position: absolute;
    top: 0; left: 0;
    height: 100%;
    width: 100%;
    background: var(--accent);
    transform: translateX(-100%);
    animation: rule-sweep 1.4s cubic-bezier(0.77, 0, 0.18, 1) 0.4s forwards;
  }

  @keyframes rule-sweep {
    to { transform: translateX(100%); }
  }

  /* ── WORK SECTION ── */
  section {
    padding: 0 3.5rem 8rem;
  }

  .section-label {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--mid);
    margin-bottom: 3rem;
  }

  .work-list {
    list-style: none;
  }

  .work-item {
    border-top: 1px solid var(--rule);
    padding: 2rem 0;
    display: grid;
    grid-template-columns: 3ch 1fr auto;
    gap: 0 2.5rem;
    align-items: baseline;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .work-list:hover .work-item { opacity: 0.35; }
  .work-list:hover .work-item:hover { opacity: 1; }

  .work-num {
    font-size: 0.7rem;
    color: var(--mid);
    letter-spacing: 0.05em;
    padding-top: 0.2rem;
  }

  .work-title {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(1.5rem, 3vw, 2.2rem);
    letter-spacing: -0.01em;
    color: var(--ink);
  }

  .work-item:hover .work-title { font-style: italic; }

  .work-meta {
    text-align: right;
  }

  .work-type {
    display: block;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--mid);
  }

  .work-year {
    display: block;
    font-size: 0.7rem;
    color: var(--rule);
    margin-top: 0.25rem;
  }

  .work-last { border-bottom: 1px solid var(--rule); }

  /* ── ABOUT ── */
  .about-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 5rem;
    padding-top: 1rem;
  }

  .about-text {
    font-size: 1.05rem;
    line-height: 1.9;
    color: var(--ink);
    max-width: 42ch;
  }

  .about-text p + p { margin-top: 1.5rem; }

  .about-aside { padding-top: 0.25rem; }

  .aside-block { margin-bottom: 3rem; }

  .aside-label {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--mid);
    margin-bottom: 1rem;
  }

  .aside-items { list-style: none; }

  .aside-items li {
    font-size: 0.85rem;
    color: var(--ink);
    padding: 0.4rem 0;
    border-bottom: 1px solid var(--rule);
  }

  /* ── CONTACT ── */
  .contact-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 2rem;
    padding: 3rem 3.5rem;
    border-top: 1px solid var(--rule);
  }

  .contact-line {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(1.8rem, 4vw, 3rem);
    color: var(--ink);
  }

  .contact-link {
    font-size: 0.75rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink);
    text-decoration: none;
    border-bottom: 1px solid var(--accent);
    padding-bottom: 2px;
    transition: color 0.2s, border-color 0.2s;
  }

  .contact-link:hover { color: var(--mid); border-color: var(--mid); }

  footer {
    padding: 2rem 3.5rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid var(--rule);
  }

  footer p {
    font-size: 0.7rem;
    color: var(--mid);
    letter-spacing: 0.05em;
  }

  .footer-links { display: flex; gap: 1.5rem; }
  .footer-links a {
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    color: var(--mid);
    text-decoration: none;
    text-transform: uppercase;
    transition: color 0.2s;
  }
  .footer-links a:hover { color: var(--ink); }

  /* ── MOBILE ── */
  @media (max-width: 640px) {
    nav { padding: 1.5rem 1.5rem; }
    .hero { padding: 10rem 1.5rem 4rem; }
    .rule-wrap, section { padding-left: 1.5rem; padding-right: 1.5rem; }
    .work-item { grid-template-columns: 3ch 1fr; }
    .work-meta { display: none; }
    .about-grid { grid-template-columns: 1fr; gap: 3rem; }
    .contact-row { padding: 2rem 1.5rem; }
    footer { padding: 1.5rem; flex-direction: column; gap: 1rem; align-items: flex-start; }
  }

  @media (prefers-reduced-motion: reduce) {
    .rule::after { animation: none; background: var(--accent); transform: none; }
  }
</style>
</head>
<body>

<nav>
  <a href="#" class="nav-logo">AM</a>
  <ul class="nav-links">
    <li><a href="#work">Work</a></li>

    <li><a href="#contact">Contact</a></li>
  </ul>
</nav>

  <div class="about-grid">

    </div>

<footer>

</body>
</html>
